name: Testing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ENV: test
      JWT_VERIFICATION_REQUEST_SECRET_KEY: test_secerte
      JWT_VERIFICATION_REQUEST_TTL: 2m
      ENVIRONMENT: testing

      MONGO_USER: admin
      MONGO_PASS: secret
      MONGO_PORT: 27017
      MONGO_DB: test_db
      MONGO_MAX_POOL_SIZE: 20

      MYSQL_USER: root
      MYSQL_PASS: supersecret
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_DB: test_db
      MYSQL_MAX_POOL_SIZE: 20
      MYSQL_QUEUE_LIMIT: 0

      GRPC_USER_PORT: 50051

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: supersecret
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -psupersecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install MySQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Install Dependencies
        run: npm ci

      - name: Wait for MySQL
        run: |
          until mysqladmin ping \
            -h127.0.0.1 \
            -uroot \
            -psupersecret \
            --silent; do
            echo "Waiting for MySQL..."
            sleep 5
          done

      - name: Verify Database
        run: |
          mysql \
            -h127.0.0.1 \
            -uroot \
            -psupersecret \
            -e "SHOW DATABASES;"

      - name: List Migration Files
        run: |
          ls -la migrations/flyway/migrations

      - name: Run Migrations
        run: |
          for file in migrations/flyway/migrations/*.sql; do
            echo "Running $file"
            mysql \
              -h127.0.0.1 \
              -uroot \
              -psupersecret \
              test_db < "$file"
          done

      - name: Run Tests
        run: npm test
