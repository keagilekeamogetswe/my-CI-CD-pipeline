name: Set up services and run tests

on:
  push:
    branches: ["main", "test-ci"]
  pull_request:
    branches: ["main", "test-ci"]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ENV: test
      ENVIRONMENT: testing

      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_DB: testdb
      MYSQL_USER: root
      MYSQL_PASS: root

      RABBITMQ_HOST: 127.0.0.1
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      rabbitmq:
        image: rabbitmq:3.12-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
        # Enable delayed message plugin
        command: >
          bash -c "rabbitmq-plugins enable --offline rabbitmq_delayed_message_exchange &&
                   rabbitmq-server"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h127.0.0.1 -uroot -proot --silent; do
            echo "Waiting for MySQL..."
            sleep 5
          done

      - name: Wait for RabbitMQ
        run: |
          until nc -z 127.0.0.1 5672; do
            echo "Waiting for RabbitMQ..."
            sleep 5
          done

      - name: Run Flyway migrations (Docker)
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/migrations/flyway/migrations:/flyway/sql \
            flyway/flyway:latest \
            -url="jdbc:mysql://127.0.0.1:3306/testdb" \
            -user="root" \
            -password="root" \
            migrate

      - name: Verify DB
        run: |
          mysql -h127.0.0.1 -uroot -proot -e "SHOW TABLES;" testdb

      - name: Run tests
        run: npm test
