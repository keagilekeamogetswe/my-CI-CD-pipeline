apiVersion: apps/v1
kind: Deployment
metadata:
  name: wireguard
  namespace: kube-system
spec:
  replicas: 1

  selector:
    matchLabels:
      app: wireguard

  template:
    metadata:
      labels:
        app: wireguard

    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      containers:
        - name: wireguard

          image: linuxserver/wireguard:latest

          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE

          env:
            - name: TZ
              value: Africa/Johannesburg

            - name: SERVERURL
              value: auto

            - name: SERVERPORT
              value: "51820"

            - name: PEERS
              value: "1"

            - name: PEERDNS
              value: auto

            - name: INTERNAL_SUBNET
              value: 10.13.13.0

            - name: ALLOWEDIPS
              value: 0.0.0.0/0

          ports:
            - containerPort: 51820
              protocol: UDP

          volumeMounts:
            - name: config
              mountPath: /config

      volumes:
        - name: config
          emptyDir: {}
