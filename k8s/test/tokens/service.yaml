apiVersion: v1
kind: Service
metadata:
  name: token-distribution-service
  namespace: social-networks
spec:
  selector:
    env: test
    role: token-distribution
  ports:
    - name: websocket
      port: 8081
      targetPort: 8081
      nodePort: 31080 # Explicit NodePort
      protocol: TCP
  type: NodePort
