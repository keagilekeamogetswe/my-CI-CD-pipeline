apiVersion: v1
kind: Service
metadata:
  name: coredns-external
  namespace: kube-system

spec:
  type: NodePort

  selector:
    k8s-app: kube-dns

  ports:
    - name: dns-udp
      protocol: UDP
      port: 53
      targetPort: 53
      nodePort: 30053

    - name: dns-tcp
      protocol: TCP
      port: 53
      targetPort: 53
      nodePort: 30054
